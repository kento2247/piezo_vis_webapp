<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Piezo FFT Visualizer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="topbar">
        <div class="titleBlock">
          <h1>ストリーミング</h1>
          <p id="status">開始を押してください</p>
        </div>

        <nav class="navLinks modeSwitch" aria-label="pages">
          <a class="active" href="./index.html">ストリーミング</a>
          <a href="./stft.html">録音分析</a>
        </nav>
      </section>

      <section class="controlDeck" aria-label="streaming controls">
        <div class="controls">
          <div class="controlGroup">
            <div class="actions">
              <button id="startButton" class="actionPrimary" type="button">開始</button>
              <button id="pauseButton" type="button" disabled>一時停止</button>
              <button id="calibrateButton" type="button" disabled>再キャリブレーション</button>
            </div>
          </div>

          <div class="controlGroup wideGroup settingsPanel">
            <div class="settings" aria-label="settings">
              <label class="sourcePicker">
                <span>入力ソース</span>
                <select id="deviceSelect">
                  <option value="">許可後に読み込み</option>
                </select>
              </label>
              <label>
                <span>sample Hz</span>
                <input id="sampleRateInput" type="number" min="8000" max="192000" step="1000" value="44100" />
              </label>
              <label>
                <span>window</span>
                <input id="windowSizeInput" type="number" min="128" max="32768" step="128" value="2048" />
              </label>
              <label>
                <span>channels</span>
                <select id="channelsInput">
                  <option value="auto">auto</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                </select>
              </label>
              <label>
                <span>history s</span>
                <input id="historyInput" type="number" min="0.25" max="30" step="0.25" value="4" />
              </label>
              <label>
                <span>max Hz</span>
                <input id="maxFrequencyInput" type="number" min="1" max="96000" step="100" value="10000" />
              </label>
              <label>
                <span>calib s</span>
                <input id="calibrationInput" type="number" min="0.25" max="20" step="0.25" value="4" />
              </label>
              <label class="recordSetting">
                <span>録音</span>
                <div class="recordControls">
                  <button id="recordToggleButton" class="recordIconButton recordStartAction" type="button" title="録音を開始" aria-label="録音を開始" disabled>
                    <svg aria-hidden="true" viewBox="0 0 24 24">
                      <circle cx="12" cy="12" r="6" />
                    </svg>
                  </button>
                  <span id="recordStatus" class="statusPill">0.0s</span>
                </div>
              </label>
            </div>
          </div>
        </div>
      </section>

      <section class="plotArea">
        <div class="axis yAxis">
          <span id="freqHigh">-- Hz</span>
          <span id="freqMid">-- Hz</span>
          <span id="freqLow">0 Hz</span>
        </div>
        <canvas id="spectrogram" aria-label="streaming frequency spectrum"></canvas>
      </section>

      <section class="legend">
        <span>-95 dB</span>
        <div class="gradient"></div>
        <span>-15 dB</span>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
