<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Piezo Recording STFT</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app historyApp">
      <section class="topbar">
        <div class="titleBlock">
          <h1>録音分析</h1>
          <p id="stftStatus">録音履歴を読み込み中</p>
        </div>

        <nav class="navLinks modeSwitch" aria-label="pages">
          <a href="./index.html">ストリーミング</a>
          <a class="active" href="./stft.html">録音分析</a>
        </nav>
      </section>

      <section class="controlDeck" aria-label="analysis controls">
        <div class="controls">
          <div class="controlGroup wideGroup">
            <div class="settings stftSettings" aria-label="stft settings">
              <label>
                <span>window</span>
                <input id="stftWindowInput" type="number" min="128" max="32768" step="128" value="2048" />
              </label>
              <label>
                <span>hop</span>
                <input id="stftHopInput" type="number" min="32" max="32768" step="32" value="512" />
              </label>
              <label>
                <span>min Hz</span>
                <input id="stftMinFrequencyInput" type="number" min="0" max="96000" step="100" value="0" />
              </label>
              <label>
                <span>max Hz</span>
                <input id="stftMaxFrequencyInput" type="number" min="1" max="96000" step="100" value="10000" />
              </label>
              <label>
                <span>velocity N</span>
                <input id="velocityCountInput" type="number" min="1" max="24" step="1" value="1" />
              </label>
            </div>
          </div>
        </div>
      </section>

      <section class="historyLayout">
        <aside class="recordingList" aria-label="recordings">
          <div class="recordingListHeader">
            <h2>録音履歴</h2>
            <button id="clearRecordingsButton" class="clearRecordingsButton" type="button">全削除</button>
          </div>
          <div id="recordingItems" class="recordingItems"></div>
        </aside>

        <section class="plotStack">
          <div class="plotToolbar">
            <span>表示切り替え</span>
            <div class="viewTabs" role="tablist" aria-label="stft views">
              <button class="viewTab active" type="button" role="tab" aria-selected="true" data-view="magnitude">振幅</button>
              <button class="viewTab" type="button" role="tab" aria-selected="false" data-view="phase">位相</button>
              <button class="viewTab" type="button" role="tab" aria-selected="false" data-view="phaseAmplitude">位相+振幅</button>
              <button class="viewTab" type="button" role="tab" aria-selected="false" data-view="collapseVelocity">包絡線+速度</button>
            </div>
          </div>
          <div class="plotArea">
            <div class="axis yAxis">
              <span id="stftFreqHigh">-- Hz</span>
              <span id="stftFreqMid">-- Hz</span>
              <span id="stftFreqLow">0 Hz</span>
            </div>
            <canvas id="stftCanvas" aria-label="recording stft"></canvas>
          </div>

          <section class="legend">
            <span id="legendDbStart">-140 dB</span>
            <div class="gradient"></div>
            <span id="legendDbEnd">0 dB</span>
            <div class="dbRangeControls" aria-label="db display range">
              <label>
                <span>low cutoff <output id="dbStartValue">-95 dB</output></span>
                <input id="dbStartInput" type="range" min="-140" max="0" step="1" value="-95" />
              </label>
              <label>
                <span>high cutoff <output id="dbEndValue">-15 dB</output></span>
                <input id="dbEndInput" type="range" min="-140" max="0" step="1" value="-15" />
              </label>
            </div>
          </section>
        </section>
      </section>
    </main>

    <script src="./stft.js"></script>
  </body>
</html>
